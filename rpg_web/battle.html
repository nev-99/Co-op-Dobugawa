<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>TD Core v10</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="gameWrapper">
      <div id="field">
        <div id="rangeCircle"></div>
      </div>

      <div id="unitBar"></div>

      <div id="infoPanel">
        <div id="infoTitle">ユニット情報</div>
        <div id="infoContent">カードにカーソルを合わせると表示</div>
      </div>
    </div>

    <script src="player-movement.js"></script>
    <script src="battle-ai.js"></script>
    <script>
      const field = document.getElementById("field");
      const rangeCircle = document.getElementById("rangeCircle");
      const unitBar = document.getElementById("unitBar");

      const infoTitle = document.getElementById("infoTitle");
      const infoContent = document.getElementById("infoContent");

      let units = [];
      let selectedCard = null;
      const keys = {};

      const UNIT_SIZE = 64;

      function getHpBarWidth(type, isCommander) {
        if (isCommander) return 64;
        if (type === "fighter") return 64;
        if (type === "archer") return 48;
        if (type === "healer") return 36;
        return 64;
      }

      const images = {
        player: "player.png",
        enemyCommander: "enemy_leader.png",
        A: "attacker.png",
        B: "gannnaA.png",
        C: "gannnaB.png",
        D: "healer.png",
        enemy: "enemy_attacker.png",
      };

      // ===== 追加：キャラデータ =====
      const characterData = {
        A: {
          name: "渡辺（ファイター）",
          desc: "自称リアリスト。だが実態は思想に寄りかかった逃避者。ネットでは無双、現実では最前線に立たされるタイプ。",
        },
        B: {
          name: "Lec（アーチャー）",
          desc: "銃器知識だけは一流。実戦経験はゼロ。強気だが弾が飛んでくると普通にビビる。",
        },
        C: {
          name: "Duke（アーチャー）",
          desc: "全てを諦めたハッカー。だが戦場ではなぜか正確無比。生きる気はないが、死ぬ気もない。",
        },
        D: {
          name: "新入りたん（ヒーラー）",
          desc: "場違いなほどの清楚枠。だがこの世界では“回復できる”という一点で最も価値が高い存在。",
        },
      };

      const playerDeck = [
        { id: "A", type: "fighter", cd: 0, active: false },
        { id: "B", type: "archer", cd: 0, active: false },
        { id: "C", type: "archer", cd: 0, active: false },
        { id: "D", type: "healer", cd: 0, active: false },
      ];

      const enemyDeck = [
        { id: "E-A", type: "fighter", cd: 0, active: false },
        { id: "E-B", type: "fighter", cd: 0, active: false },
      ];

      // ===== UI =====
      playerDeck.forEach((card) => {
        const el = document.createElement("div");
        el.className = "card";
        el.style.backgroundImage = `url(${images[card.id]})`;
        unitBar.appendChild(el);

        card.el = el;

        el.onclick = () => {
          if (card.cd > 0 || card.active) return;
          playerDeck.forEach((c) => c.el.classList.remove("selected"));
          el.classList.add("selected");
          selectedCard = card;
        };

        // ===== 追加：ホバー表示 =====
        el.onmouseenter = () => {
          const data = characterData[card.id];
          if (!data) return;
          infoTitle.textContent = data.name;
          infoContent.textContent = data.desc;
        };

        el.onmouseleave = () => {
          infoTitle.textContent = "ユニット情報";
          infoContent.textContent = "カードにカーソルを合わせると表示";
        };
      });

      function getStats(type) {
        if (type === "fighter")
          return {
            hp: 120,
            maxHp: 120,
            speed: 0.6,
            range: 60,
            attack: 1.2,
            cooldownMax: 30,
          };
        if (type === "archer")
          return {
            hp: 70,
            maxHp: 70,
            speed: 0.5,
            range: 180,
            attack: 0.5,
            cooldownMax: 10,
          };
        if (type === "healer")
          return {
            hp: 60,
            maxHp: 60,
            speed: 0.5,
            range: 140,
            heal: 0.6,
            cooldownMax: 20,
          };
      }

      function spawnUnit(x, y, team, card, isCommander = false) {
        const stats = isCommander
          ? { hp: 500, maxHp: 500, speed: 1.5, range: 80, attack: 1 }
          : getStats(card.type);

        const el = document.createElement("div");
        el.className = "unit";

        if (isCommander) {
          el.style.backgroundImage =
            team === "player"
              ? `url(${images.player})`
              : `url(${images.enemyCommander})`;
        } else {
          if (team === "player") {
            el.style.backgroundImage = `url(${images[card.id]})`;
          } else {
            el.style.backgroundImage = `url(${images.enemy})`;
          }
        }

        field.appendChild(el);

        const hpbar = document.createElement("div");
        hpbar.className = "hpbar";

        const hpfill = document.createElement("div");
        hpfill.className = "hpfill";

        hpbar.appendChild(hpfill);
        el.appendChild(hpbar);

        const unit = {
          x,
          y,
          team,
          ...stats,
          type: card.type,
          card,
          cooldown: 0,
          isCommander,
          el,
          hpbar,
          hpfill,
        };

        if (card) card.active = true;

        units.push(unit);
        return unit;
      }

      const playerCommander = spawnUnit(
        100,
        250,
        "player",
        { type: "fighter" },
        true,
      );
      spawnUnit(850, 250, "enemy", { type: "fighter" }, true);

      window.addEventListener(
        "keydown",
        (e) => (keys[e.key.toLowerCase()] = true),
      );
      window.addEventListener(
        "keyup",
        (e) => (keys[e.key.toLowerCase()] = false),
      );

      field.onmouseenter = () => (rangeCircle.style.display = "block");
      field.onmouseleave = () => (rangeCircle.style.display = "none");

      field.onclick = (e) => {
        if (!selectedCard || selectedCard.cd > 0 || selectedCard.active) return;

        const rect = field.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const d = Math.hypot(x - playerCommander.x, y - playerCommander.y);

        if (d < 120) {
          spawnUnit(x, y, "player", selectedCard);
          selectedCard.cd = 180;
          selectedCard.el.classList.add("hidden");
          selectedCard = null;
        }
      };

      setInterval(() => {
        enemyDeck.forEach((card) => {
          if (card.cd <= 0 && !card.active) {
            spawnUnit(800, Math.random() * 460, "enemy", card);
            card.cd = 180;
          }
        });
      }, 2000);

      function update() {
        // ===== プレイヤー移動処理 =====
        updatePlayerMovement(playerCommander, keys);

        // ===== 射程円の位置更新 =====
        rangeCircle.style.left = playerCommander.x - 120 + "px";
        rangeCircle.style.top = playerCommander.y - 120 + "px";

        // ===== カードのクールダウン管理 =====
        [...playerDeck, ...enemyDeck].forEach((c) => {
          if (c.cd > 0) c.cd--;
          if (c.el) {
            c.el.classList.toggle("cooldown", c.cd > 0);
            if (!c.active) c.el.classList.remove("hidden");
          }
        });

        // ===== バトル制御 =====
        updateBattleAI(units);

        // ===== 描画更新（位置・HPバー） =====
        units.forEach((u) => {
          u.el.style.left = u.x + "px";
          u.el.style.top = u.y + "px";

          const ratio = u.hp / u.maxHp;
          const barWidth = getHpBarWidth(u.type, u.isCommander);

          u.hpbar.style.width = barWidth + "px";
          u.hpfill.style.width = barWidth * ratio + "px";
        });

        // ===== 死亡処理・ユニット削除 =====
        units = units.filter((u) => {
          if (u.hp <= 0) {
            if (u.isCommander) {
              alert(u.team === "player" ? "敗北" : "勝利");
              location.reload();
            }
            if (u.card) {
              u.card.active = false;
              u.card.cd = 180;
            }
            u.el.remove();
            return false;
          }
          return true;
        });

        // ===== 次フレーム =====
        requestAnimationFrame(update);
      }

      update();
    </script>
  </body>
</html>
