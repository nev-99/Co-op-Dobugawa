<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>溝川201</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        user-select: none;
      }

      #pauseOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }

      .card {
        width: 30%;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px;
        border: 1px solid #888;
        background: rgba(0, 0, 0, 0.05);
      }

      #info {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px;
        border: 1px solid #888;
        background: rgba(0, 0, 0, 0.05);
      }

      #info > img {
        flex-shrink: 0;
      }

      #info #status {
        flex: 1;
      }

      #pauseText {
        color: white;
        font-size: 24px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="gameWrapper">
      <div>コーポ・溝川 前</div>
      <div id="field"></div>

      <div id="info">
        <img src="player.png" alt="Player" style="width: 64px; height: 64px" />
        <div id="status">
          <div>矢野良一（21）　Lv.1</div>
          <div>
            冴えないフリーター。 <br />
            HP: 100/100<br />
            MP: 20/20<br />
            ATK: 10
          </div>
        </div>
      </div>
      
      <!-- <div class="card">
        <img src="player.png" alt="Player" style="width: 64px; height: 64px" />
    </div> -->

    <div id="pauseOverlay">
      <div id="pauseText">
        ポーズ中<br />
        （画面領域が狭すぎだよ）
      </div>
    </div>

    <script>
      const characterData = {
        A: {
          name: "渡辺",
          desc: "36歳思想の強い独身ニート",
          image: "attacker.png"
        }
      };

      const images = {
        player: "player.png",
        A: "attacker.png",
        people: "people.png",
      };
    </script>

    <script>
      function updatePlayerMovement(playerCommander, keys) {
        if (keys["a"] || keys["arrowleft"])
          playerCommander.x -= playerCommander.speed;
        if (keys["d"] || keys["arrowright"])
          playerCommander.x += playerCommander.speed;
        if (keys["w"] || keys["arrowup"])
          playerCommander.y -= playerCommander.speed;
        if (keys["s"] || keys["arrowdown"])
          playerCommander.y += playerCommander.speed;

        playerCommander.x = Math.max(0, Math.min(860, playerCommander.x));
        playerCommander.y = Math.max(0, Math.min(460, playerCommander.y));
      }
    </script>

    <script>
      const field = document.getElementById("field");

      let isPaused = false;
      let gameMode = "normal";

      const keys = {};

      window.addEventListener("keydown", (e) => {
        keys[e.key.toLowerCase()] = true;
      });

      window.addEventListener("keyup", (e) => {
        keys[e.key.toLowerCase()] = false;
      });

      const UNIT_SIZE = 64;

      function checkScreenSize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const ratio = w / h;

        if (w < 1000 || ratio < 0.75) {
          pauseGame();
        } else {
          resumeGame();
        }
      }

      const pauseOverlay = document.getElementById("pauseOverlay");

      function pauseGame() {
        if (isPaused) return;
        isPaused = true;
        pauseOverlay.style.display = "flex";
      }

      function resumeGame() {
        if (!isPaused) return;
        isPaused = false;
        pauseOverlay.style.display = "none";
      }

      function createPlayer(x, y) {
        const el = document.createElement("div");

        el.style.position = "absolute";
        el.style.left = x + "px";
        el.style.top = y + "px";
        el.style.width = UNIT_SIZE + "px";
        el.style.height = UNIT_SIZE + "px";
        el.style.backgroundImage = `url(${images.player})`;
        el.style.backgroundSize = "contain";
        el.style.backgroundRepeat = "no-repeat";
        el.style.backgroundPosition = "center";

        field.appendChild(el);

        return {
          el,
          x,
          y,
          speed: 4,
        };
      }

      const playerCommander = createPlayer(100, 100);

      function createNPC(id, x, y) {
        const npc = document.createElement("div");

        npc.style.position = "absolute";
        npc.style.left = x + "px";
        npc.style.top = y + "px";
        npc.style.width = UNIT_SIZE + "px";
        npc.style.height = UNIT_SIZE + "px";
        npc.style.backgroundImage = `url(${images[id]})`;
        npc.style.backgroundSize = "contain";
        npc.style.backgroundRepeat = "no-repeat";
        npc.style.backgroundPosition = "center";

        const talkUI = document.createElement("div");
        talkUI.textContent = "Talk";
        talkUI.style.position = "absolute";
        talkUI.style.top = "-20px";
        talkUI.style.width = "100%";
        talkUI.style.textAlign = "center";
        talkUI.style.color = "white";
        talkUI.style.fontSize = "12px";
        talkUI.style.display = "none";

        npc.appendChild(talkUI);
        field.appendChild(npc);

        return { id, el: npc, x, y, talkUI };
      }

      function createWanderNPC(x, y) {
        const npc = document.createElement("div");

        npc.style.position = "absolute";
        npc.style.left = x + "px";
        npc.style.top = y + "px";
        npc.style.width = UNIT_SIZE + "px";
        npc.style.height = UNIT_SIZE + "px";
        npc.style.backgroundImage = `url(${images.people})`;
        npc.style.backgroundSize = "contain";
        npc.style.backgroundRepeat = "no-repeat";
        npc.style.backgroundPosition = "center";

        field.appendChild(npc);

        return {
          el: npc,
          x,
          y,

          // 移動用パラメータ
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          speed: 1,

          // 行動範囲
          originX: x,
          originY: y,
          range: 50 + Math.random() * 100,

          changeTimer: 0,
        };
      }

      const watanabe = createNPC("A", 300, 200);

      const npcs = [watanabe];

      const wanderNPCs = [];

      for (let i = 0; i < 5; i++) {
        const npc = createWanderNPC(Math.random() * 800, Math.random() * 400);
        wanderNPCs.push(npc);
      }

      function isNear(player, npc) {
        const dx = player.x - npc.x;
        const dy = player.y - npc.y;
        return Math.sqrt(dx * dx + dy * dy) < 100;
      }

      const status = document.getElementById("status");
      const infoImg = document.querySelector("#info img");

      const conversations = {
        A: ["よう", "なんだお前", "話しかけてくるなよ"],
      };

      let currentConversation = [];
      let lastTalkEndTime = 0;
      const TALK_COOLDOWN = 1000;
      let currentIndex = 0;

      function startConversation(npc) {
        gameMode = "conversation";

        currentConversation = conversations[npc.id];
        currentIndex = 0;

        // ↓ここ変更
        status.innerHTML =
          `${characterData[npc.id].name}「${currentConversation[0]}」`;

          // 画像切り替え
          if (characterData[npc.id].image) {
            infoImg.src = characterData[npc.id].image;
            infoImg.style.display = "block";
          } else {
            infoImg.style.display = "none";
          }
      }

      window.addEventListener("resize", checkScreenSize);

      window.addEventListener("click", (e) => {
        const rect = field.getBoundingClientRect();

        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        // 会話中 → 会話送り
        if (gameMode === "conversation") {
          currentIndex++;
          

          if (currentIndex >= currentConversation.length) {
            gameMode = "normal";

            lastTalkEndTime = Date.now();

            // ↓これ追加（元の表示に戻す）
            status.innerHTML = `
              <div>矢野良一（21）　Lv.1</div>
              <div>
                冴えないフリーター。 <br />
                HP: 100/100<br />
                MP: 20/20<br />
                ATK: 10
              </div>
            `;

            // プレイヤー画像に戻す
infoImg.src = "player.png";
infoImg.style.display = "block";

            return;
          }

          status.innerHTML =
            `${characterData[watanabe.id].name}「${currentConversation[currentIndex]}」`;
            
            return;
        } else {
          // ▼ 手前のNPC優先でソート
          const sortedNPCs = [...npcs].sort(
            (a, b) => b.y + UNIT_SIZE - (a.y + UNIT_SIZE),
          );

          // ▼ NPCクリック判定
          for (const npc of sortedNPCs) {
            const withinX = clickX >= npc.x && clickX <= npc.x + UNIT_SIZE;
            const withinY = clickY >= npc.y && clickY <= npc.y + UNIT_SIZE;

            if (
              withinX &&
              withinY &&
              isNear(playerCommander, npc) &&
              Date.now() - lastTalkEndTime > TALK_COOLDOWN
            ) {
              startConversation(npc);
              return;
            }
          }
        }
      });

      function updateWanderNPC(npc) {
        npc.changeTimer--;

        // 一定時間ごとに方向変える
        if (npc.changeTimer <= 0) {
          npc.vx = (Math.random() - 0.5) * 2;
          npc.vy = (Math.random() - 0.5) * 2;
          npc.changeTimer = 60 + Math.random() * 120;
        }

        // 移動
        npc.x += npc.vx * npc.speed;
        npc.y += npc.vy * npc.speed;

        // 行動範囲制限（円っぽく戻す）
        const dx = npc.x - npc.originX;
        const dy = npc.y - npc.originY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > npc.range) {
          npc.vx *= -1;
          npc.vy *= -1;
        }

        // DOM反映
        npc.el.style.left = npc.x + "px";
        npc.el.style.top = npc.y + "px";

        // 描画順（超重要）
        npc.el.style.zIndex = Math.floor(npc.y + UNIT_SIZE);
      }

      function update() {
        checkScreenSize();

        if (isPaused) {
          requestAnimationFrame(update);
          return;
        }

        // 移動はnormal時だけ
        if (gameMode === "normal") {
          updatePlayerMovement(playerCommander, keys);
        }

        playerCommander.el.style.left = playerCommander.x + "px";
        playerCommander.el.style.top = playerCommander.y + "px";

        playerCommander.el.style.zIndex = Math.floor(
          playerCommander.y + UNIT_SIZE,
        );

        // 一般人NPC更新
        for (const npc of wanderNPCs) {
          updateWanderNPC(npc);
        }

        watanabe.el.style.zIndex = Math.floor(watanabe.y + UNIT_SIZE);

        // Talk表示
        if (isNear(playerCommander, watanabe) && gameMode === "normal") {
          watanabe.talkUI.style.display = "block";
        } else {
          watanabe.talkUI.style.display = "none";
        }

        requestAnimationFrame(update);
      }

      update();
    </script>
  </body>
</html>
