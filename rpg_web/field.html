<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>溝川201</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        user-select: none;
      }

      #pauseOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }

      #pauseText {
        color: white;
        font-size: 24px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="gameWrapper">
      <div id="field"></div>
    </div>

    <div
      id="dialogueBox"
      style="
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 120px;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        display: none;
        padding: 10px;
      "
    >
      <div id="dialogueText"></div>
    </div>

    <div id="pauseOverlay">
      <div id="pauseText">
        ポーズ中<br />
        （画面領域が狭すぎだよ）
      </div>
    </div>

    <script>
      const characterData = {
        A: { name: "渡辺", desc: "36歳思想の強い独身ニート" },
      };

      const images = {
        player: "player.png",
        A: "attacker.png",
      };
    </script>

    <script>
      function updatePlayerMovement(playerCommander, keys) {
        if (keys["a"] || keys["arrowleft"])
          playerCommander.x -= playerCommander.speed;
        if (keys["d"] || keys["arrowright"])
          playerCommander.x += playerCommander.speed;
        if (keys["w"] || keys["arrowup"])
          playerCommander.y -= playerCommander.speed;
        if (keys["s"] || keys["arrowdown"])
          playerCommander.y += playerCommander.speed;

        playerCommander.x = Math.max(0, Math.min(860, playerCommander.x));
        playerCommander.y = Math.max(0, Math.min(460, playerCommander.y));
      }
    </script>

    <script>
      const field = document.getElementById("field");

      let isPaused = false;
      let gameMode = "normal";

      const keys = {};

      window.addEventListener("keydown", (e) => {
        keys[e.key.toLowerCase()] = true;
      });

      window.addEventListener("keyup", (e) => {
        keys[e.key.toLowerCase()] = false;
      });

      const UNIT_SIZE = 64;

      function checkScreenSize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const ratio = w / h;

        if (w < 1000 || ratio < 0.75) {
          pauseGame();
        } else {
          resumeGame();
        }
      }

      const pauseOverlay = document.getElementById("pauseOverlay");

      function pauseGame() {
        if (isPaused) return;
        isPaused = true;
        pauseOverlay.style.display = "flex";
      }

      function resumeGame() {
        if (!isPaused) return;
        isPaused = false;
        pauseOverlay.style.display = "none";
      }

      function createPlayer(x, y) {
        const el = document.createElement("div");

        el.style.position = "absolute";
        el.style.left = x + "px";
        el.style.top = y + "px";
        el.style.width = UNIT_SIZE + "px";
        el.style.height = UNIT_SIZE + "px";
        el.style.backgroundImage = `url(${images.player})`;
        el.style.backgroundSize = "contain";
        el.style.backgroundRepeat = "no-repeat";
        el.style.backgroundPosition = "center";

        field.appendChild(el);

        return {
          el,
          x,
          y,
          speed: 4,
        };
      }

      const playerCommander = createPlayer(100, 100);

      function createNPC(id, x, y) {
        const npc = document.createElement("div");

        npc.style.position = "absolute";
        npc.style.left = x + "px";
        npc.style.top = y + "px";
        npc.style.width = UNIT_SIZE + "px";
        npc.style.height = UNIT_SIZE + "px";
        npc.style.backgroundImage = `url(${images[id]})`;
        npc.style.backgroundSize = "contain";
        npc.style.backgroundRepeat = "no-repeat";
        npc.style.backgroundPosition = "center";

        const talkUI = document.createElement("div");
        talkUI.textContent = "Talk";
        talkUI.style.position = "absolute";
        talkUI.style.top = "-20px";
        talkUI.style.width = "100%";
        talkUI.style.textAlign = "center";
        talkUI.style.color = "white";
        talkUI.style.fontSize = "12px";
        talkUI.style.display = "none";

        npc.appendChild(talkUI);
        field.appendChild(npc);

        return { id, el: npc, x, y, talkUI };
      }

      const watanabe = createNPC("A", 300, 200);

      const npcs = [watanabe];

      function isNear(player, npc) {
        const dx = player.x - npc.x;
        const dy = player.y - npc.y;
        return Math.sqrt(dx * dx + dy * dy) < 100;
      }

      const dialogueBox = document.getElementById("dialogueBox");
      const dialogueText = document.getElementById("dialogueText");

      const conversations = {
        A: ["よう", "なんだお前", "話しかけてくるなよ"],
      };

      let currentConversation = [];
      let lastTalkEndTime = 0;
      const TALK_COOLDOWN = 1000;
      let currentIndex = 0;

      function startConversation(npc) {
        gameMode = "conversation";

        currentConversation = conversations[npc.id];
        currentIndex = 0;

        dialogueBox.style.display = "block";
        dialogueText.textContent = `${characterData[npc.id].name}「${currentConversation[0]}」`;
      }

      window.addEventListener("resize", checkScreenSize);

      window.addEventListener("click", (e) => {
        const rect = field.getBoundingClientRect();

        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        // 会話中 → 会話送り
        if (gameMode === "conversation") {
          currentIndex++;

          if (currentIndex >= currentConversation.length) {
            dialogueBox.style.display = "none";
            gameMode = "normal";

            lastTalkEndTime = Date.now(); // ←追加

            return;
          }

          dialogueText.textContent = `${characterData[watanabe.id].name}「${currentConversation[currentIndex]}」`;
          return;
        } else {
          // ▼ 手前のNPC優先でソート
          const sortedNPCs = [...npcs].sort(
            (a, b) => b.y + UNIT_SIZE - (a.y + UNIT_SIZE),
          );

          // ▼ NPCクリック判定
          for (const npc of sortedNPCs) {
            const withinX = clickX >= npc.x && clickX <= npc.x + UNIT_SIZE;
            const withinY = clickY >= npc.y && clickY <= npc.y + UNIT_SIZE;

            if (
              withinX &&
              withinY &&
              isNear(playerCommander, npc) &&
              Date.now() - lastTalkEndTime > TALK_COOLDOWN
            ) {
              startConversation(npc);
              return;
            }
          }
        }
      });

      function update() {
        checkScreenSize();

        if (isPaused) {
          requestAnimationFrame(update);
          return;
        }

        // 移動はnormal時だけ
        if (gameMode === "normal") {
          updatePlayerMovement(playerCommander, keys);
        }

        playerCommander.el.style.left = playerCommander.x + "px";
        playerCommander.el.style.top = playerCommander.y + "px";

        playerCommander.el.style.zIndex = Math.floor(
          playerCommander.y + UNIT_SIZE,
        );

        watanabe.el.style.zIndex = Math.floor(watanabe.y + UNIT_SIZE);

        // Talk表示
        if (isNear(playerCommander, watanabe) && gameMode === "normal") {
          watanabe.talkUI.style.display = "block";
        } else {
          watanabe.talkUI.style.display = "none";
        }

        requestAnimationFrame(update);
      }

      update();
    </script>
  </body>
</html>
