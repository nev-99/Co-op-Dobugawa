<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>溝川201</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        user-select: none;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #gameWrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .title {
        font-size: 32px;
        margin-bottom: 100px;
      }

      .menu-button {
        width: 100px;
        padding: 3px 0;
        margin: 3px 0;
        cursor: pointer;
        position: relative;
        font-size: 18px;
      }

      .menu-button:hover {
        text-decoration: underline;
      }

      .menu-button::before {
        content: "▶";
        position: absolute;
        opacity: 0;
      }

      .menu-button:hover::before {
        opacity: 1;
        left: -25px;
      }

      .menu-button:active {
        opacity: 0.7;
      }

      /* モーダル背景 */
      #loadModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
      }

      /* 中身のウィンドウ */
      .modal-content {
        color: white;
        background: black;
        padding: 30px;
        width: 300px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* タイトル */
      .modal-title {
        font-size: 20px;
      }

      /* データなし表示 */
      .no-data {
        color: #666;
      }

      /* 入力エリア */
      .recall-area input {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
      }

      .recall-area button {
        width: 100%;
        padding: 8px;
        cursor: pointer;
      }

      /* 閉じる */
      .close-btn {
        cursor: pointer;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="gameWrapper">
      <div class="title">コーポ・溝川201</div>
      <div class="menu-button" id="startBtn">START</div>
      <div class="menu-button" id="loadBtn">LOAD</div>
      <div class="menu-button">OPTION</div>
    </div>

    <div id="loadModal">
      <div class="modal-content">
        <div class="modal-title">LOAD</div>
        <div id="saveDataArea">
          <div class="no-data">データがありません</div>
        </div>

        <div class="recall-area">
          <input
            type="text"
            id="recallInput"
            placeholder="リコールコードを入力"
          />
          <button id="recallBtn">決定</button>
        </div>

        <div class="close-btn">閉じる</div>
      </div>
    </div>

    <script>
      const loadBtn = document.getElementById("loadBtn");
      const loadModal = document.getElementById("loadModal");
      const closeBtn = document.querySelector(".close-btn");
      const startBtn = document.getElementById("startBtn");

      startBtn.addEventListener("click", () => {
        window.location.href = "scenario.html";
      });

      // 開く
      loadBtn.addEventListener("click", () => {
        loadModal.style.display = "flex";
      });

      // 閉じる
      closeBtn.addEventListener("click", () => {
        loadModal.style.display = "none";
      });

      // 背景クリックでも閉じる
      loadModal.addEventListener("click", (e) => {
        if (e.target === loadModal) {
          loadModal.style.display = "none";
        }
      });
    </script>
  </body>
</html>
