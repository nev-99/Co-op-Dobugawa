<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コーポ・溝川β</title>
<link rel="stylesheet" href="stage.css">
</head>
<body>

<div id="frame">
<div id="game">

<div id="distanceText"></div>
<div id="cigText"></div>

<div id="message">
  <div id="messageText"></div>
  <div id="nextBtn">次へ進む</div>
</div>

<div id="meter"><div id="meterFill"></div></div>

<div id="advanceBtn">進む</div>
<div id="useCigBtn">タバコ吸う</div>

<!-- フィールドHP -->
<div id="fieldHp">
  <div>HP</div>
  <div class="bar"><div id="fieldHpFill" class="fill"></div></div>
</div>

<!-- バトル -->
<div id="battle">
  <div id="enemy"></div>

  <div id="uiArea">
    <div id="attackBtn">
      <div id="attackFill"></div>
      <div id="attackText">攻撃</div>
    </div>

    <div>
      矢野
      <div>HP</div>
      <div class="bar"><div id="hpFill" class="fill"></div></div>
    </div>
  </div>
</div>

</div>
</div>

<script src="stage.js"></script>
<script src="battle.js"></script>

</body>
</html>
