<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コーポ・溝川β</title>
<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:"MS Gothic", monospace;
  color:white;
}

#frame {
  width:640px;
  height:480px;
  transform-origin:center;
  user-select:none;
}

#game {
  width:640px;
  height:480px;
  position:relative;
}

/* 上部 */
#distanceText { position:absolute; top:20px; left:20px; }
#cigText { position:absolute; top:40px; left:20px; }

/* メッセージ */
#message {
  position:absolute;
  top:35%;
  width:100%;
  text-align:center;
  display:none;
}

#nextBtn {
  margin-top:10px;
  padding:6px 16px;
  border:1px solid white;
  cursor:pointer;
  display:none;
}

/* メーター */
#meter {
  position:absolute;
  bottom:40px;
  left:20px;
  width:600px;
  height:20px;
  border:1px solid white;
}
#meterFill { height:100%; width:0%; background:white; }

/* ボタン */
#advanceBtn {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:8px 20px;
  border:1px solid white;
  cursor:pointer;
}

#useCigBtn {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  padding:6px 16px;
  border:1px solid white;
  cursor:pointer;
}

/* アイテム */
.item { position:absolute; width:20px; height:10px; cursor:pointer; }
.cig { background:yellow; }
.stub { background:brown; }

/* フィールドHP */
#fieldHp {
  position:absolute;
  bottom:160px;
  left:20px;
  display:none;
}
.bar { width:200px; height:10px; border:1px solid white; }
.fill { height:100%; width:100%; background:white; }

/* バトル */
#battle {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:none;
}

#enemy {
  position:absolute;
  top:120px;
  left:260px;
  width:120px;
  height:120px;
  border:1px solid white;
}

#uiArea {
  position:absolute;
  bottom:20px;
  left:20px;
}

/* 攻撃ボタン */
#attackBtn {
  position:relative;
  width:200px;
  height:40px;
  border:1px solid white;
  cursor:pointer;
  overflow:hidden;
}

#attackFill {
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:0%;
  background:rgba(255,255,255,0.5);
}

#attackText {
  position:absolute;
  width:100%;
  text-align:center;
  top:10px;
}

/* 発光 */
.ready {
  box-shadow:0 0 10px rgba(255,255,0,0.8);
}

/* エフェクト */
.flash { opacity:0.2; }

.explosion {
  position:absolute;
  width:20px;
  height:20px;
  background:red;
  border-radius:50%;
}
</style>
</head>
<body>

<div id="frame">
<div id="game">

<div id="distanceText"></div>
<div id="cigText"></div>

<div id="message">
  <div id="messageText"></div>
  <div id="nextBtn">次へ進む</div>
</div>

<div id="meter"><div id="meterFill"></div></div>

<div id="advanceBtn">進む</div>
<div id="useCigBtn">タバコ吸う</div>

<!-- フィールドHP -->
<div id="fieldHp">
  <div>HP</div>
  <div class="bar"><div id="fieldHpFill" class="fill"></div></div>
</div>

<!-- バトル -->
<div id="battle">
  <div id="enemy"></div>

  <div id="uiArea">
    <div id="attackBtn">
      <div id="attackFill"></div>
      <div id="attackText">攻撃</div>
    </div>

    <div>
      矢野
      <div>HP</div>
      <div class="bar"><div id="hpFill" class="fill"></div></div>
    </div>
  </div>
</div>

</div>
</div>

<script>
const game = document.getElementById("game");

const distanceText = document.getElementById("distanceText");
const cigText = document.getElementById("cigText");
const meterFill = document.getElementById("meterFill");

const advanceBtn = document.getElementById("advanceBtn");
const useCigBtn = document.getElementById("useCigBtn");

const message = document.getElementById("message");
const messageText = document.getElementById("messageText");
const nextBtn = document.getElementById("nextBtn");

const battle = document.getElementById("battle");
const enemyDiv = document.getElementById("enemy");

const attackBtn = document.getElementById("attackBtn");
const attackFill = document.getElementById("attackFill");

const hpFill = document.getElementById("hpFill");
const fieldHpFill = document.getElementById("fieldHpFill");
const fieldHp = document.getElementById("fieldHp");

/* 状態 */
let player = {
  hp:30,
  maxHp:30,
  atk:5,
  attackSpeed:1000,
  cigs:3
};

let enemy=null;
let enemyTimer=null;

let currentDistance=0;
const goalDistance=1000;
let lastAttackTime=0;

let healing=0;
let healRate=0;

/* UI */
function updateUI(){
  distanceText.textContent=currentDistance+"m / "+goalDistance+"m";
  cigText.textContent="タバコ: "+player.cigs+"本";
  meterFill.style.width=(currentDistance/goalDistance*100)+"%";
  hpFill.style.width=(player.hp/player.maxHp*100)+"%";
  fieldHpFill.style.width=(player.hp/player.maxHp*100)+"%";

  if(player.hp>=player.maxHp || currentDistance>=goalDistance){
    useCigBtn.style.display="none";
  }else{
    useCigBtn.style.display="block";
  }
}

/* 回復 */
function startHeal(amount){
  healing=amount;
  healRate=amount/2000;
  fieldHp.style.display="block";
}

function healLoop(){
  if(healing>0){
    const d=healRate*16;
    player.hp=Math.min(player.hp+d,player.maxHp);
    healing-=d;
    if(healing<=0) fieldHp.style.display="none";
    updateUI();
  }
  requestAnimationFrame(healLoop);
}
healLoop();

/* アイテム */
function clearItems(){
  document.querySelectorAll(".item").forEach(e=>e.remove());
}

function spawnItems(){
  clearItems();

  if(Math.random()<0.5){
    const isCig=Math.random()<0.3;

    if(!isCig && player.hp>=player.maxHp) return;

    const item=document.createElement("div");
    item.className="item "+(isCig?"cig":"stub");

    item.style.left=Math.random()*600+"px";
    item.style.top=(240+Math.random()*200)+"px";

    item.onclick=()=>{
      if(isCig){
        player.cigs++;
      }else{
        startHeal(5);
      }
      item.remove();
      updateUI();
    };

    game.appendChild(item);
  }
}

/* タバコ */
useCigBtn.onclick=()=>{
  if(player.cigs<=0)return;
  player.cigs--;
  startHeal(player.maxHp);
  updateUI();
};

/* 遷移 */
nextBtn.onclick=()=>{
  window.location.href="stage2.html";
};

/* 進む */
advanceBtn.onclick=()=>{

  if(currentDistance>=goalDistance)return;

  currentDistance+=Math.floor(Math.random()*120)+80;

  if(currentDistance>=goalDistance){
    currentDistance=goalDistance;

    clearItems();
    battle.style.display="none";

    messageText.textContent="セブンに到着した";
    message.style.display="block";
    nextBtn.style.display="block";

    advanceBtn.style.display="none";
    return;
  }

  spawnItems();

  if(Math.random()<0.3){
    enemy={hp:20,atk:3,speed:2000};
    battle.style.display="block";
    advanceBtn.style.display="none";
    enemyLoop();
  }

  updateUI();
};

updateUI();
</script>
<script src="battle.js"></script>

</body>
</html>
